services:
  - type: web
    name: aw-client-portal-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aw-client-portal-db
          property: connectionString

databases:
  - name: aw-client-portal-db
    databaseName: aw_portal
    user: aw_portal
    plan: free
